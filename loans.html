<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Loans - BookHive</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef2f7;
    min-height:100vh;
}

/* HEADER */

.header{
    background:#1f2a44;
    color:#fff;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:4px solid #c9a227;
}

.logo h1{
    font-size:24px;
}

.logo p{
    opacity:.8;
}

.header-actions{
    display:flex;
    gap:10px;
}

.btn{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.loans-btn{
    background:#c9a227;
    color:#fff;
}

.history-btn{
    background:#3498db;
    color:white;
}

.logout-btn{
    background:#e74c3c;
    color:white;
}
.loans-btn.active{
    background:#ffffff;
    color:#1f2a44;
    border:2px solid #c9a227;
    box-shadow:0 0 10px rgba(201,162,39,.5);
}

/* MAIN */

main{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

/* PAGE TITLE */

main::before{
    content:"📖 My Borrowed Books";
    display:block;
    font-size:28px;
    font-weight:bold;
    color:#1f2a44;
    margin-bottom:20px;
}

/* LOANS GRID */

#loans{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

/* CARD */

.loan-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.3s;
    border-left:5px solid #c9a227;
}

.loan-card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.loan-card h3{
    color:#1f2a44;
    margin-bottom:15px;
}

.loan-card p{
    margin:10px 0;
    color:#555;
}

/* RETURN BUTTON */

.return-btn{
    width:100%;
    margin-top:15px;
    background:#1f2a44;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.return-btn:hover{
    background:#314269;
}

/* STATUS */

.status-active{
    color:#27ae60;
    font-weight:bold;
}

.status-returned{
    color:#7f8c8d;
    font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }

    .header-actions{
        width:100%;
        justify-content:center;
        flex-wrap:wrap;
    }

    #loans{
        grid-template-columns:1fr;
    }

}
</style>
</head>

<body>
<header class="header">

    <div class="logo">
        <h1>BookHive Library System</h1>
        <div id="userInfo" style="color:white; font-weight:bold;"></div>
    </div>

    <div class="header-actions">

    <a href="catalog.html">
        <button id="nav-books" class="btn loans-btn">Books</button>
    </a>

    <a href="loans.html">
        <button id="nav-loans" class="btn loans-btn">Loans</button>
    </a>
    
    <button class="btn logout-btn" onclick="logout()">
        Logout
    </button>

</div>

</header>

<main>

<div id="loans"></div>

</main>

<script>

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || !user.id) {
        alert("You are not logged in!");
        window.location.href = "login.html";
    }

document.getElementById("userInfo").innerText =
    "Logged in as: " + user.name + " (" + user.role + ")";

fetch("../api/myloans.php?user_id=" + user.id)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("loans");

    if (data.length === 0) {
        container.innerHTML = "<p>No loans found.</p>";
        return;
    }

    data.forEach(loan => {

        const div = document.createElement("div");
        div.className = "loan-card";

        div.innerHTML = `
            <h3>📚 ${loan.title}</h3>

            <p><strong>Borrowed Copies:</strong> ${loan.copies_borrowed}</p>

            <p>📅 Borrow Date: ${loan.borrow_date}</p>

            <p>⏳ Due Date: ${loan.due_date}</p>

            <button class="return-btn" data-book="${loan.book_id}">
                Return Book
            </button>
        `;

                container.appendChild(div);
            });

        })
.catch(error => {
    console.log(error);
    document.getElementById("loans").innerHTML =
        "<p>Failed to load loans.</p>";
});

document.addEventListener("click", function (e) {

    if (e.target.classList.contains("return-btn")) {

        const bookId = e.target.dataset.book;
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user || !user.id) {
            alert("Not logged in!");
            return;
        }

        fetch("../api/return.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                book_id: bookId,
                member_id: user.id
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.message) {
                alert(data.message);
                location.reload();
            } else {
                alert(data.error || "Error returning book");
            }

        });

    }
});
function logout() {
    let confirmLogout = confirm("Are you sure you want to log out?");

    if (confirmLogout) {
        localStorage.clear();
        window.location.href = "login.html";
    }
}

//button//

const currentPage = window.location.pathname.split("/").pop();

if(currentPage === "catalog.html"){
    document.getElementById("nav-books")?.classList.add("active");
}

if(currentPage === "loans.html"){
    document.getElementById("nav-loans")?.classList.add("active");
}

if(currentPage === "history.html"){
    document.getElementById("nav-history")?.classList.add("active");
}
</script>

</body>
</html>
